<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil — Navy Lily</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    body { font-family: serif; margin: 0; }
    header.site {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: .75rem 1rem; 
    }
    header.site .brand {
      font-weight: 600; text-decoration: none; color: inherit; margin-right: auto;
    }
    header.site .btn {
      font: inherit; text-decoration: none; color: inherit;
      padding: .25rem .6rem;
    }
    main { max-width: 40rem; margin: 0 auto; padding: 1rem; }
    /* The big square avatar on the profile itself. */
    .avatar {
      width: 128px; height: 128px; overflow: hidden;
      box-sizing: border-box; background: #eee;
      display: inline-flex; align-items: center; justify-content: center;
      font: 600 56px serif; color: #333;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .row { margin: 1rem 0; }
    .hint { color: #666; font-size: .9rem; }
    .err { color: #b00; font-size: .9rem; }
    .ok { color: #070; font-size: .9rem; }
    textarea { font: inherit; width: 100%; box-sizing: border-box; }
    input[type=text] { font: inherit; padding: .25rem .4rem; }
    button { font: inherit; }
    .edit { font-size: .85rem; margin-left: .4rem; }
    .cancel { margin-left: .25rem; }
    .at { color: #666; }
    .bio { white-space: pre-wrap; margin: .35rem 0; }
    #email { font-size: .9rem; color: #555; }
    /* Phone: let the forms breathe and stop the file picker / username field
       from overflowing the screen and forcing a horizontal scroll. */
    @media (max-width: 480px) {
      main { padding: 1rem .75rem; }
      header.site { gap: .5rem; }
      .avatar { width: 96px; height: 96px; font-size: 42px; }
      .row form > * { margin-bottom: .4rem; }
      input[type=file], input[type=text] { max-width: 100%; }
      input[type=text] { width: 100%; }
      #username-form button, #bio-form button, #avatar-form button { display: block; }
    }
      /* navy form controls */
    header.site { background: #ADB6C6; }
    button { background: #0B1F3A !important; color: #FFFFFF !important; }
    button[type=button] { background: #28456B !important; }
    input, select, textarea { background: #D7E0EC !important; color: #0B1F3A !important; accent-color: #0B1F3A; }
    input::placeholder, textarea::placeholder { color: #51719A !important; }
    .lesson-complete-btn.is-done { background: #3D5A80 !important; }
    /* Phone: compact header — smaller logo + tighter buttons share one row. */
    @media (max-width: 480px) {
      header.site { gap: .4rem; padding: .5rem .6rem; }
      header.site .brand img { height: 16px !important; width: auto !important; }
      header.site .btn { padding: .2rem .4rem; font-size: .85em; }
    }
  @media(max-width:640px){.lbl-rest{display:none}}
  </style>
</head>
<body bgcolor="white">
  <!-- Splash: black + white logo while the data loads (Discord-style).
       splashDone() drops it; the timeout is a failsafe so a slow request or a
       JS error never leaves the screen black. -->
  <div id="splash"><img src="/logo.png?v=3" alt=""></div>
  <style>
    #splash { position: fixed; inset: 0; z-index: 999; background: #000;
              display: flex; align-items: center; justify-content: center; }
    #splash img { width: min(80vw, 420px); filter: brightness(0) invert(1);
                  animation: splash-pulse 1.6s ease-in-out infinite; }
    @keyframes splash-pulse { 50% { opacity: .35; } }
    /* Desktop: nearly edge to edge; phones keep it readable, not absurd. */
    @media (min-width: 768px) { #splash img { width: 88vw; } }
  </style>
  <script>
    function splashDone() { var s = document.getElementById('splash'); if (s) s.remove(); }
    setTimeout(splashDone, 4000);
  </script>
  <header class="site">
    <a class="btn" href="/login" aria-label="Perfil" title="Perfil">👤</a>
    <a class="brand" href="/"><img src="/logo.png?v=3" alt="Navy Lily" loading="lazy" style="height:28px;width:auto;display:block"></a>
    <a class="btn" href="/community" aria-label="Comunidade" title="Comunidade">💬<span class="lbl-rest"> Comunidade</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/wiki" aria-label="Wiki" title="Wiki">📖<span class="lbl-rest"> Wiki</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/comprar" aria-label="Navy" title="Navy">⛵</a>
  </header>
  <main>
  <p id="loading">Carregando…</p>

  <div id="profile" hidden>
    <h1 id="display-name"></h1>
    <p id="streak-line" hidden></p>
    <p id="public-link" class="hint" hidden></p>

    <!-- Avatar: free to change whenever. -->
    <div class="row">
      <div class="avatar" id="avatar"></div>
      <form id="avatar-form" class="row">
        <input type="file" name="avatar" id="avatar-file" accept="image/*" required
               aria-label="Escolher foto de perfil">
        <button type="submit">Enviar foto</button>
        <span id="avatar-msg"></span>
        <div class="hint">Vira um quadrado pequeno (128px). PNG, JPEG ou GIF.</div>
      </form>
    </div>

    <!-- Username: shown as plain text; the input only appears on "editar".
         First pick free, then a limited number of changes for life. -->
    <div class="row">
      <strong>Nome de usuário:</strong>
      <span id="username-view"></span>
      <a href="#" id="username-edit" class="edit">editar</a>
      <form id="username-form" hidden>
        <span class="at">@</span><input type="text" name="username" id="username-input"
               minlength="3" maxlength="20" pattern="[a-z0-9_]+" required
               autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false"
               aria-label="Nome de usuário" style="text-transform: lowercase">
        <button type="submit">Salvar</button>
        <button type="button" class="cancel" id="username-cancel">Cancelar</button>
      </form>
      <div class="hint" id="username-hint"></div>
      <span id="username-msg"></span>
    </div>

    <!-- Bio: shown as plain text; the textarea only appears on "editar". -->
    <div class="row">
      <strong>Bio:</strong>
      <a href="#" id="bio-edit" class="edit">editar</a>
      <p class="bio" id="bio-view"></p>
      <form id="bio-form" hidden>
        <span class="hint" id="bio-count"></span>
        <textarea name="bio" id="bio-input" rows="4" maxlength="1000" aria-label="Bio"></textarea><br>
        <button type="submit">Salvar</button>
        <button type="button" class="cancel" id="bio-cancel">Cancelar</button>
      </form>
      <span id="bio-msg"></span>
    </div>

    <!-- Device-local study state (same localStorage the lesson pages write):
         continue where you left off + saved lessons. Filled by the script
         below; each line stays hidden when this device has nothing for it. -->
    <hr>
    <p id="continue-link" hidden></p>
    <p id="saved-list" hidden></p>

    <hr>
    <p class="hint"><strong>E-mail:</strong> <span id="email"></span></p>
    <p><strong>Assinatura:</strong> <span id="member"></span></p>
    <p id="lessons-link" hidden><a href="/community">Postar na comunidade →</a></p>
    <p id="buy-link" hidden><a href="/comprar">Assinar para prioridade nos conselhos e feedback (R$ 497/ano) →</a></p>
    <p><a href="/auth/logout">Sair</a></p>
  </div>
  </main>

  <script src="/header.js?v=11" defer></script>
  <script>
  (function () {
    var MAX_CHARS = 1000;
    // Last values loaded from the server, so "Cancelar" can restore the field
    // instead of leaving the half-typed edit behind for the next open.
    var curUsername = '', curBio = '';

    function el(id) { return document.getElementById(id); }
    function initialFor(d) { return ((d.username || d.email || '?').charAt(0)).toUpperCase(); }

    function renderAvatar(d) {
      var box = el('avatar');
      box.textContent = '';
      if (d.has_avatar) {
        var img = document.createElement('img');
        img.src = '/avatar/me?v=' + (d.avatar_ver || Date.now());
        img.alt = 'Foto de perfil';
        // If the stored picture 404s (e.g. cleared on disk) fall back to the
        // initial instead of showing a broken-image icon.
        img.onerror = function () { box.textContent = initialFor(d); };
        box.appendChild(img);
      } else {
        box.textContent = initialFor(d);
      }
    }

    function renderUsernameHint(d) {
      var h = el('username-hint');
      if (!d.username_set) {
        h.textContent = 'Escolha seu nome de usuário (3–20 caracteres: a–z, 0–9, _). ' +
          'Você poderá alterá-lo depois até ' + (d.edits_left) + ' vezes.';
      } else if (d.edits_left > 0) {
        h.textContent = 'Você ainda pode alterar seu nome de usuário ' + d.edits_left + ' vez(es).';
      } else {
        h.textContent = 'Você atingiu o limite de alterações do nome de usuário.';
        el('username-edit').hidden = true; // no edits left -> no way to open the form
      }
    }

    // Toggle a section between its plain-text view and its edit form.
    function setUsernameEdit(on, focus) {
      el('username-form').hidden = !on;
      el('username-view').hidden = on;
      el('username-edit').hidden = on;
      if (on && focus !== false) el('username-input').focus();
    }
    function setBioEdit(on, focus) {
      el('bio-form').hidden = !on;
      el('bio-view').hidden = on;
      el('bio-edit').hidden = on;
      if (on && focus !== false) el('bio-input').focus();
    }

    function renderBioCount() {
      var n = el('bio-input').value.trim().length;
      var c = el('bio-count');
      c.textContent = n + '/' + MAX_CHARS + ' caracteres';
      c.className = n > MAX_CHARS ? 'err' : 'hint';
    }

    function fill(d) {
      curUsername = d.username || '';
      curBio = d.bio || '';
      el('display-name').textContent = d.username ? '@' + d.username : 'Sem nome de usuário';
      (function() {
        var TIERS = [[0,'🌱'],[1,'🌿'],[2,'🌸'],[4,'✨'],[8,'🔥'],[16,'⭐'],[32,'🌙'],[63,'💎'],[126,'👑'],[251,'🐱🪷'],[500,'🌻']];
        function lsj(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}
        function dk(dt){return dt.getFullYear()+'-'+('0'+(dt.getMonth()+1)).slice(-2)+'-'+('0'+dt.getDate()).slice(-2);}
        var sdays=lsj('nl-study-days')||{},sd=new Date(),streak=0;
        if(!sdays[dk(sd)])sd.setDate(sd.getDate()-1);
        while(sdays[dk(sd)]){streak++;sd.setDate(sd.getDate()-1);}
        if(streak<1)return;
        var sem=TIERS[0][1];for(var i=0;i<TIERS.length;i++){if(streak>=TIERS[i][0])sem=TIERS[i][1];}
        var sl=el('streak-line');
        sl.textContent=sem+' '+streak+' dia'+(streak===1?'':'s')+' seguidos';
        sl.hidden=false;
      })();
      el('username-view').textContent = d.username ? '@' + d.username : '(não definido)';
      el('username-edit').textContent = d.username ? 'editar' : 'escolher';
      el('bio-view').textContent = d.bio || '(sem bio)';
      el('email').textContent = d.email || '';
      var until = d.member_until ? new Date(d.member_until).toLocaleDateString('pt-BR') : '';
      el('member').textContent = d.member
        ? 'Ativa' + (until ? ' — acesso até ' + until : '')
        : (until ? 'Inativa — expirou em ' + until : 'Inativa');
      el('lessons-link').hidden = false;    // posting is free — everyone gets the link
      el('buy-link').hidden = !!d.member;    // non-members: upsell guaranteed critique
      el('username-input').value = curUsername;
      el('bio-input').value = curBio;
      // Public vanity link, once a username exists.
      var pl = el('public-link');
      if (d.username) {
        pl.textContent = 'Seu perfil público: ';
        var a = document.createElement('a');
        a.href = '/@' + d.username;
        a.textContent = location.origin + '/@' + d.username;
        pl.appendChild(a);
        pl.hidden = false;
      } else {
        pl.textContent = '';
        pl.hidden = true;
      }
      renderAvatar(d);
      // Collapse forms back to plain text after a reload. A brand-new account with
      // no username yet gets the picker opened up front (without grabbing focus, so
      // a phone keyboard doesn't pop on load) so the first thing to do is obvious.
      setUsernameEdit(!d.username_set, false);
      setBioEdit(false);
      renderUsernameHint(d);
      renderBioCount();
      el('loading').hidden = true;
      el('profile').hidden = false;
      splashDone();
    }

    function load() {
      return fetch('/api/profile', { headers: { Accept: 'application/json' } })
        .then(function (r) {
          if (r.status === 401) { location.replace('/login?next=' + encodeURIComponent('/profile')); return null; }
          if (!r.ok) throw new Error('load');
          return r.json();
        })
        .then(function (d) { if (d) fill(d); });
    }

    // POST a form body to url; on success reload the profile, else show msg.
    function submit(url, body, msgEl, okText) {
      msgEl.textContent = '…'; msgEl.className = 'hint';
      return fetch(url, { method: 'POST', body: body })
        .then(function (r) {
          if (r.ok) {
            return load().then(function () { msgEl.textContent = okText; msgEl.className = 'ok'; });
          }
          return r.text().then(function (t) { msgEl.textContent = t || 'Erro.'; msgEl.className = 'err'; });
        })
        .catch(function () { msgEl.textContent = 'Erro de conexão.'; msgEl.className = 'err'; });
    }

    el('bio-input').addEventListener('input', renderBioCount);

    // Keep the username field in its stored shape (lowercase a-z, 0-9, _) as the
    // user types, so the native pattern check can't block submit with a cryptic
    // "match the requested format" popup over a stray capital or space.
    el('username-input').addEventListener('input', function () {
      var v = this.value.toLowerCase().replace(/[^a-z0-9_]/g, '');
      if (v !== this.value) this.value = v;
    });

    el('username-edit').addEventListener('click', function (e) { e.preventDefault(); setUsernameEdit(true); });
    el('username-cancel').addEventListener('click', function () {
      el('username-msg').textContent = '';
      el('username-input').value = curUsername; // discard unsaved edits
      setUsernameEdit(false);
    });
    el('bio-edit').addEventListener('click', function (e) { e.preventDefault(); setBioEdit(true); });
    el('bio-cancel').addEventListener('click', function () {
      el('bio-msg').textContent = '';
      el('bio-input').value = curBio; // discard unsaved edits
      renderBioCount();
      setBioEdit(false);
    });

    // Preview a freshly chosen avatar locally before it's uploaded, so the user
    // sees what they picked (cropped square, like the server will store it).
    el('avatar-file').addEventListener('change', function () {
      var f = this.files[0];
      if (!f) return;
      var url = URL.createObjectURL(f);
      var box = el('avatar');
      box.textContent = '';
      var img = document.createElement('img');
      img.src = url;
      img.alt = 'Pré-visualização';
      img.onload = function () { URL.revokeObjectURL(url); };
      box.appendChild(img);
      el('avatar-msg').textContent = 'Pré-visualização — clique em "Enviar foto" para salvar.';
      el('avatar-msg').className = 'hint';
    });

    el('username-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var b = new FormData(); b.append('username', el('username-input').value.trim().toLowerCase());
      submit('/api/profile/username', b, el('username-msg'), 'Salvo!');
    });

    el('bio-form').addEventListener('submit', function (e) {
      e.preventDefault();
      if (el('bio-input').value.trim().length > MAX_CHARS) {
        el('bio-msg').textContent = 'Máximo de ' + MAX_CHARS + ' caracteres.'; el('bio-msg').className = 'err'; return;
      }
      var b = new FormData(); b.append('bio', el('bio-input').value);
      submit('/api/profile/bio', b, el('bio-msg'), 'Salvo!');
    });

    el('avatar-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var f = el('avatar-file').files[0];
      if (!f) { el('avatar-msg').textContent = 'Escolha um arquivo.'; el('avatar-msg').className = 'err'; return; }
      var b = new FormData(); b.append('avatar', f);
      submit('/api/avatar', b, el('avatar-msg'), 'Foto atualizada!');
    });

    load().catch(function () {
      splashDone();
      el('loading').textContent = 'Não foi possível carregar sua conta. ';
      var a = document.createElement('a'); a.href = '/login'; a.textContent = 'Entrar';
      el('loading').appendChild(a);
    });

    // Device-local study state, written by the lesson pages into localStorage
    // (nl-last-lesson, nl-bookmarks). Shown here instead of on the lesson
    // lists; sits inside #profile, so it appears together with the account.
    (function () {
      function lsGet(k, d) { try { return JSON.parse(localStorage.getItem(k)) || d; } catch (e) { return d; } }
      var last = lsGet('nl-last-lesson', null);
      if (last && last.h) {
        var p = el('continue-link');
        var a = document.createElement('a');
        a.href = last.h;
        a.textContent = '▶ continuar de onde parou: ' + (last.t || 'última aula') + ' →';
        p.appendChild(a);
        p.hidden = false;
      }
      var bms = lsGet('nl-bookmarks', {});
      var keys = Object.keys(bms);
      if (keys.length) {
        var s = el('saved-list');
        s.appendChild(document.createTextNode('⭐ Aulas salvas: '));
        keys.forEach(function (k, i) {
          if (i) s.appendChild(document.createTextNode(' · '));
          var a = document.createElement('a');
          a.href = bms[k].h;
          a.textContent = bms[k].t || k;
          s.appendChild(a);
        });
        s.hidden = false;
      }
    })();
  })();
  </script>
</body>
</html>
