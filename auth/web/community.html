<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comunidade — Navy Lily</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    body { font-family: serif; margin: 0; }
    header.site {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: .75rem 1rem; 
    }
    header.site .brand {
      font-weight: 600; text-decoration: none; color: inherit; margin-right: auto;
    }
    header.site .btn {
      font: inherit; text-decoration: none; color: inherit;
      padding: .25rem .6rem;
    }
    /* The page you're on: marked in the nav instead of looking like elsewhere. */
    header.site .btn[aria-current="page"] { color: #1A3F7A; font-weight: 600; }
    main { max-width: 40rem; margin: 0 auto; padding: 1rem; }
    h1 { margin: 0 0 .25rem; }
    .hint { color: #666; font-size: .9rem; }
    .err { color: #b00; }
    .ok { color: #070; }
    button:focus-visible, a:focus-visible, textarea:focus-visible, input:focus-visible {
      outline: 2px solid #1A3F7A; outline-offset: 2px;
    }

    /* A small square avatar, reused at a couple of sizes (set inline). */
    .ava {
      display: inline-flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: #eee; color: #333; box-sizing: border-box; vertical-align: middle;
    }
    .ava img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Compose box + the "why you can't post" gate that replaces it. The area
       reserves a line so the async-resolved gate pushes content down less. */
    #compose-area { min-height: 2.4rem; }
    #compose { padding: .5rem .75rem .4rem; margin-bottom: 1.5rem; }
    #gate { margin: .25rem 0 1.5rem; }
    .gate-list { margin: .4rem 0; padding-left: 1.25rem; }
    .gate-list li { margin: .3rem 0; }
    /* Twitter-shaped: your avatar beside one quiet line that grows as you type. */
    #compose .crow { display: flex; gap: .6rem; align-items: flex-start; }
    /* A bordered field with square corners so it reads as a writing box
       (Twitter's composer), in the site's input colors. */
    #compose textarea {
      flex: 1; font: inherit; font-size: 1.05rem;
      border: 1px solid #9FB0C9 !important; background: #D7E0EC !important; color: #0B1F3A !important;
      resize: none; padding: .55rem .7rem; box-sizing: border-box;
    }
    #compose textarea:focus { border-color: #1A3F7A !important; }
    #compose .controls { display: flex; align-items: center; gap: .35rem; flex-wrap: wrap; }
    #compose .controls #compose-btn { margin-left: auto; }
    #compose button, .reply button, .editbox button { font: inherit; }
    .iconbtn { font: inherit; font-size: 1.15rem; line-height: 1; cursor: pointer; padding: .4rem .5rem; }
    .count { color: #666; font-size: .85rem; }
    .count.warn { color: #b00; }
    /* Attached image: a thumbnail with its ✕ right on it, like everywhere else. */
    #compose-img-preview { position: relative; display: inline-block; max-width: 100%; }
    #compose-img-preview img { max-height: 160px; max-width: 100%; display: block; margin: .25rem 0 .5rem; }
    .imgx { position: absolute; top: .6rem; right: .35rem; width: 1.7rem; height: 1.7rem; padding: 0 !important; line-height: 1; cursor: pointer; }

    /* Board tabs: one bar below the header, split into equal-width segments
       (symmetric tabs). The selected board fills navy; !important overrides the
       page-wide navy button fill so these read as tabs, not buttons. */
    .boards { display: flex; margin: 0 0 1.25rem; border: 1px solid #0B1F3A; }
    .board-tab {
      flex: 1; text-align: center;
      font: inherit; cursor: pointer; padding: .55rem .9rem; border: none;
      background: #E6EAF1 !important; color: #28456B !important;
    }
    .board-tab + .board-tab { border-left: 1px solid #0B1F3A; }
    .board-tab:not([aria-current="page"]):hover { background: #D7DEEA !important; }
    .board-tab[aria-current="page"] { background: #0B1F3A !important; color: #fff !important; }

    /* Posts. */
    .post { padding: 1rem 0; }
    .post .head { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .post .head a { text-decoration: none; color: inherit; }
    .post .actions { margin-left: auto; display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; justify-content: flex-end; }
    .meta a { text-decoration: none; color: inherit; }
    .meta .name { font-weight: 600; }
    .meta .memberbadge { display: inline-block; margin-left: .35rem; padding: 0 .32rem;
      background: #1A3F7A; color: #fff; font-size: .62rem; font-weight: 700;
      letter-spacing: .06em; line-height: 1.6; vertical-align: middle; cursor: help; }
    .meta .anon { color: #666; }
    .meta .time { color: #666; font-weight: 400; font-size: .9rem; }
    .meta .linkbtn, .meta .del-wrap { margin-left: .4rem; }
    /* The timestamp doubles as the post's permanent link; the dotted underline
       says "clickable" without shouting. */
    a.plink { color: inherit; text-decoration: none; }
    a.plink time { text-decoration: underline dotted; }
    /* The first line/heading of a post: a real heading (screen readers can jump
       post to post), shown slightly larger than the body. */
    h2.post-title { font-size: 1.15rem; font-weight: 600; margin: .4rem 0 .15rem; overflow-wrap: anywhere; }
    .post-title-link { color: inherit; text-decoration: none; }
    .post-title-link:hover, .post-title-link:focus { text-decoration: underline; }
    /* In the feed the body is one big click target that opens the thread; the
       cursor says so, but text, links and the image keep their own behaviour. */
    .post .content.clickable { cursor: pointer; }
    .post .content.clickable .md { cursor: text; }
    .post .post-img { max-width: 100%; display: block; margin-top: .5rem; }
    .post .foot { margin-top: .5rem; display: flex; align-items: center; flex-wrap: wrap; gap: 1rem; }
    /* Text buttons: underlined (not color-only) and padded out to a usable
       touch target; the negative margin keeps the visual rhythm unchanged. */
    .linkbtn, .del {
      font: inherit; background: none; border: none; cursor: pointer;
      text-decoration: underline; color: #1A3F7A;
      padding: .45rem .4rem; margin: -.4rem -.35rem;
    }
    /* Emoji buttons: no underline (an underlined emoji looks broken) and
       grayscale, so the only color in the row is the red heart once liked. */
    .cbtn, .like, .share, .iconbtn { text-decoration: none; filter: grayscale(1); }
    .like[aria-pressed="true"] { filter: none; }
    .del { color: #b00; font-size: .85rem; }
    .comment .del, .comment .linkbtn { font-size: .8rem; }
    .confirm { font-size: .85rem; color: #b00; }
    /* The yes/no pair are full-size, separated targets: a fat finger must not
       land on "sim" while aiming at "não". */
    .confirm .linkbtn { font-size: .85rem; padding: .45rem .7rem; margin: 0; }
    .confirm .yes { color: #b00; }
    .newreplies { color: #1A3F7A; font-weight: 600; font-size: .9rem; }

    /* Rendered markdown (post bodies + comments). */
    .md { overflow-wrap: anywhere; }
    .md p { margin: .5rem 0; white-space: pre-wrap; }
    .md ul, .md ol { margin: .5rem 0; padding-left: 1.5rem; }
    .md blockquote { margin: .5rem 0; padding-left: .75rem; color: #555; }
    .md pre { background: #f6f6f6; padding: .5rem .6rem; overflow-x: auto; }
    .md code { font-family: monospace; }
    .md pre code { font-size: .9rem; }
    .md a { color: #1A3F7A; }
    .comment .md p { margin: .25rem 0; }

    /* Comments under a post. */
    .comments { margin: .75rem 0 0 .5rem; padding-left: .75rem; }
    .comment { display: flex; gap: .5rem; margin: .75rem 0; }
    .comment.is-reply { margin-left: 2rem; border-left: 2px solid #c8d3e3; padding-left: .5rem; }
    .comment .cmain { min-width: 0; flex: 1; }
    .comment .meta .time { font-size: .85rem; }
    .reply-to { font-size: .8rem; color: #666; margin-bottom: .1rem; }
    .reply-to a { color: inherit; text-decoration: none; }
    .reply { margin-top: .5rem; }
    .reply textarea, .editbox textarea { font: inherit; width: 100%; box-sizing: border-box; }
    .reply .row, .editbox .row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; margin-top: .25rem; }
    .msg { font-size: .85rem; }

    #pinned:not(:empty) { margin-bottom: .5rem; }
    .pinned-label { margin: .75rem 0 0; }

    /* Single-post page (/post/<id>): only the post + its thread show; the feed,
       composer, boards and their messages are out of the way. */
    body.post-page #boards,
    body.post-page #compose-area,
    body.post-page #ownerbar,
    body.post-page #feed,
    body.post-page #empty,
    body.post-page #feed-error,
    body.post-page #end,
    body.post-page #more { display: none !important; }
    .backlink { margin: .25rem 0 1rem; }
    .backlink a { text-decoration: none; color: #1A3F7A; font-weight: 600; }
    #more { font: inherit; margin: 1.5rem auto; display: block; padding: .5rem 1rem; }
    @media (max-width: 480px) { main { padding: 1rem .75rem; } header.site { gap: .5rem; } }
      /* navy form controls */
    header.site { background: #ADB6C6; }
    /* …but never the inline text actions (editar/apagar/sim/não/…): as filled
       pills they'd flatten the hierarchy and lose the red danger color. */
    button:not(.linkbtn):not(.del):not(.iconbtn) { background: #0B1F3A !important; color: #FFFFFF !important; }
    button[type=button]:not(.linkbtn):not(.del):not(.iconbtn) { background: #28456B !important; }
    /* Toolbar icons stay quiet, like Twitter's — the only filled pill is Publicar. */
    .iconbtn { background: none; border: none; color: inherit; }
    input, select, textarea { background: #D7E0EC !important; color: #0B1F3A !important; accent-color: #0B1F3A; }
    input::placeholder, textarea::placeholder { color: #3D5A80 !important; }
    .lesson-complete-btn.is-done { background: #3D5A80 !important; }
    /* Phone: compact header — smaller logo + tighter buttons share one row. */
    @media (max-width: 480px) {
      header.site { gap: .4rem; padding: .5rem .6rem; }
      header.site .brand img { height: 16px !important; width: auto !important; }
      header.site .btn { padding: .4rem .5rem; font-size: .9em; }
    }
  @media(max-width:640px){.lbl-rest{display:none}}
  </style>
</head>
<body bgcolor="white">
  <!-- Splash: black + white logo while the data loads (Discord-style).
       splashDone() drops it; the timeout is a failsafe so a slow request or a
       JS error never leaves the screen black. -->
  <div id="splash"><img src="/logo.png?v=3" alt=""></div>
  <style>
    #splash { position: fixed; inset: 0; z-index: 999; background: #000;
              display: flex; align-items: center; justify-content: center; }
    #splash img { width: min(80vw, 420px); filter: brightness(0) invert(1);
                  animation: splash-pulse 1.6s ease-in-out infinite; }
    @keyframes splash-pulse { 50% { opacity: .35; } }
    /* Desktop: nearly edge to edge; phones keep it readable, not absurd. */
    @media (min-width: 768px) { #splash img { width: 88vw; } }
  </style>
  <script>
    function splashDone() { var s = document.getElementById('splash'); if (s) s.remove(); }
    setTimeout(splashDone, 4000);
  </script>
  <header class="site">
    <a class="btn" href="/login" aria-label="Perfil" title="Perfil">👤</a>
    <a class="brand" href="/"><img src="/logo.png?v=3" alt="Navy Lily" loading="lazy" style="height:28px;width:auto;display:block"></a>
    <a class="btn" href="/community" aria-current="page" aria-label="Comunidade" title="Comunidade">💬<span class="lbl-rest"> Comunidade</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/wiki" aria-label="Wiki" title="Wiki">📖<span class="lbl-rest"> Wiki</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/comprar" aria-label="Navy" title="Navy">⛵</a>
  </header>
  <main>
    <!-- Owner-only: the "members first" review queue (must-review before free). -->
    <p id="ownerbar" hidden><button type="button" id="queue-toggle" class="linkbtn">Fila de membros</button></p>

    <!-- Boards: share work for critique ("feedback") and sketchbook pages
         ("sketchbooks"). The selected board scopes both the feed and new posts. -->
    <nav id="boards" class="boards" aria-label="Quadros">
      <button type="button" class="board-tab" data-board="feedback">Feedback</button>
      <button type="button" class="board-tab" data-board="sketchbooks">Sketchbooks</button>
    </nav>

    <!-- Compose: shown only to members with a username, and only after the
         daily-limit check resolves (so the box never vanishes mid-typing).
         Otherwise #gate explains why (logged out / not a member / no username /
         already posted today). Everyone can still read. -->
    <div id="compose-area">
      <div id="compose" hidden>
        <form id="compose-form">
          <div class="crow">
            <span id="compose-ava" aria-hidden="true"></span>
            <textarea id="compose-body" rows="1" maxlength="2000"
                      placeholder="Compartilhe um trabalho ou uma dúvida…" aria-label="Sua publicação"></textarea>
          </div>
          <div id="compose-img-preview"></div>
          <div class="controls">
            <button type="button" id="compose-attach" class="iconbtn" title="Anexar imagem — JPG, PNG ou GIF (pode arrastar ou colar)" aria-label="Anexar imagem">📷</button>
            <button type="button" id="compose-attach-text" class="linkbtn">adicionar imagem</button>
            <input type="file" id="compose-image" accept="image/png,image/jpeg,image/gif" hidden>
            <span id="compose-count" class="count" role="status" hidden>0/2000</span>
            <span id="compose-msg" class="hint" role="status"></span>
            <button type="submit" id="compose-btn">Publicar</button>
          </div>
        </form>
      </div>
      <div id="gate" class="hint" role="status" hidden></div>
    </div>

    <div id="pinned"></div>
    <div id="feed" aria-busy="true"><p class="hint">Carregando…</p></div>
    <p id="empty" class="hint" hidden>Ainda não há publicações.</p>
    <p id="feed-error" class="hint" hidden>Não foi possível carregar a comunidade.
      <button type="button" id="retry" class="linkbtn">Tentar novamente</button></p>
    <p id="end" class="hint" hidden>Isso é tudo por aqui.</p>
    <button type="button" id="more" hidden>Carregar mais</button>
  </main>

  <script src="/header.js?v=11" defer></script>
  <script>
  (function () {
    var PAGE = 30;            // matches the server's feed page size
    var VALID_BOARDS = { feedback: 1, sketchbooks: 1 };
    var BOARD = (function () {  // selected board: scopes the feed + new posts
      var b = (new URLSearchParams(location.search).get('board') || '').toLowerCase();
      return VALID_BOARDS[b] ? b : 'feedback';
    })();
    var me = {};              // /me result: { logged_in, member, owner, username, ... }
    var canPost = false;      // any logged-in account with a username (posting is free)
    var lastId = 0;           // smallest post id shown, for "load more"
    var membersOnly = false;  // owner's "members first" review queue toggle
    // A post can be opened on its own page: /post/<id> (Twitter-style) or, for
    // older shared links, /community?post=<id>. Either turns on detail mode.
    var pinnedId = (function () {
      var m = location.pathname.match(/^\/post\/(\d+)/);
      if (m) return parseInt(m[1], 10);
      return parseInt(new URLSearchParams(location.search).get('post'), 10) || 0;
    })();
    var detailMode = !!pinnedId;          // single-post page: hide the feed chrome
    if (detailMode) document.body.classList.add('post-page');
    var allPosts = [];        // every post object rendered so far (for re-renders)
    var meApplied = false, firstRendered = false;

    function el(id) { return document.getElementById(id); }
    var feed = el('feed'), empty = el('empty'), moreBtn = el('more'), pinned = el('pinned');

    // ----- localStorage, best-effort (private mode may throw) -----
    var DRAFT_KEY = 'nl-community-draft', SEEN_KEY = 'nl-seen-comments';
    function saveDraft(v) { try { if (v) localStorage.setItem(DRAFT_KEY, v); else localStorage.removeItem(DRAFT_KEY); } catch (e) {} }
    function readDraft() { try { return localStorage.getItem(DRAFT_KEY) || ''; } catch (e) { return ''; } }
    // seen: {postId: commentCountLastSeen} for the member's own posts, so the
    // feed can flag "N novas respostas" — otherwise replies are only ever
    // discovered by reopening threads by hand.
    function readSeen() { try { return JSON.parse(localStorage.getItem(SEEN_KEY) || '{}') || {}; } catch (e) { return {}; } }
    function writeSeen() { try { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); } catch (e) {} }
    var seen = readSeen();

    // ----- Minimal, XSS-safe markdown -> DOM (build nodes, never innerHTML) -----
    var INLINE = /(`[^`]+`)|(\*\*[^*]+\*\*)|(__[^_]+__)|(\*[^*]+\*)|(_[^_]+_)|(\[[^\]]+\]\([^)\s]+\))/;

    function inline(text, parent) {
      var m;
      while ((m = INLINE.exec(text)) !== null) {
        if (m.index > 0) parent.appendChild(document.createTextNode(text.slice(0, m.index)));
        var tok = m[0];
        if (tok.charAt(0) === '`') {
          var code = document.createElement('code'); code.textContent = tok.slice(1, -1); parent.appendChild(code);
        } else if (tok.slice(0, 2) === '**' || tok.slice(0, 2) === '__') {
          var b = document.createElement('strong'); inline(tok.slice(2, -2), b); parent.appendChild(b);
        } else if (tok.charAt(0) === '*' || tok.charAt(0) === '_') {
          var it = document.createElement('em'); inline(tok.slice(1, -1), it); parent.appendChild(it);
        } else {
          var lm = /^\[([^\]]+)\]\(([^)\s]+)\)$/.exec(tok);
          var a = document.createElement('a');
          a.setAttribute('href', /^(https?:|mailto:|\/)/i.test(lm[2]) ? lm[2] : '#'); // reject javascript:, data:, …
          a.textContent = lm[1]; a.target = '_blank'; a.rel = 'noopener nofollow ugc';
          parent.appendChild(a);
        }
        text = text.slice(m.index + tok.length);
      }
      if (text) parent.appendChild(document.createTextNode(text));
    }

    function markdown(text) {
      var box = document.createElement('div'); box.className = 'md';
      // Normalise CRLF/CR to LF first: a trailing \r makes the heading regex's
      // `.*$` fail while isSpecial() still matches, which would leave a line no
      // branch consumes and spin the loop below forever (crashing the tab).
      var lines = (text || '').replace(/\r\n?/g, '\n').split('\n'), i = 0;
      function isSpecial(s) { return /^```|^#{1,6}\s+|^>\s?|^[-*]\s+|^\d+\.\s+/.test(s); }
      while (i < lines.length) {
        var line = lines[i];
        if (/^```/.test(line)) {
          i++; var buf = [];
          while (i < lines.length && !/^```/.test(lines[i])) { buf.push(lines[i]); i++; }
          i++; // closing fence
          var pre = document.createElement('pre'), c = document.createElement('code');
          c.textContent = buf.join('\n'); pre.appendChild(c); box.appendChild(pre); continue;
        }
        var hm = /^#{1,6}\s+(.*)$/.exec(line);
        if (hm) { var h = document.createElement('p'), st = document.createElement('strong'); inline(hm[1], st); h.appendChild(st); box.appendChild(h); i++; continue; }
        if (/^>\s?/.test(line)) {
          var quote = [];
          while (i < lines.length && /^>\s?/.test(lines[i])) { quote.push(lines[i].replace(/^>\s?/, '')); i++; }
          var bq = document.createElement('blockquote'); inline(quote.join(' '), bq); box.appendChild(bq); continue;
        }
        if (/^[-*]\s+/.test(line)) {
          var ul = document.createElement('ul');
          while (i < lines.length && /^[-*]\s+/.test(lines[i])) { var li = document.createElement('li'); inline(lines[i].replace(/^[-*]\s+/, ''), li); ul.appendChild(li); i++; }
          box.appendChild(ul); continue;
        }
        if (/^\d+\.\s+/.test(line)) {
          var ol = document.createElement('ol');
          while (i < lines.length && /^\d+\.\s+/.test(lines[i])) { var li2 = document.createElement('li'); inline(lines[i].replace(/^\d+\.\s+/, ''), li2); ol.appendChild(li2); i++; }
          box.appendChild(ol); continue;
        }
        if (line.trim() === '') { i++; continue; }
        var para = [];
        while (i < lines.length && lines[i].trim() !== '' && !isSpecial(lines[i])) { para.push(lines[i]); i++; }
        // Guard: if a "special"-looking line reaches here that no branch above
        // consumed, take it as plain text so i always advances (never loops).
        if (para.length === 0) { para.push(line); i++; }
        var p = document.createElement('p'); inline(para.join('\n'), p); box.appendChild(p);
      }
      return box;
    }

    // First non-blank line (minus a leading "#") is the title; the rest is body.
    function splitTitle(body) {
      var lines = (body || '').replace(/\r\n?/g, '\n').split('\n'), i = 0;
      while (i < lines.length && lines[i].trim() === '') i++;
      if (i >= lines.length) return { title: '', rest: '' };
      return {
        title: lines[i].replace(/^#{1,6}\s*/, '').trim(),
        rest: lines.slice(i + 1).join('\n').replace(/^\s+/, '')
      };
    }

    // ----- Friendly errors: never dump raw server/proxy bodies on the page -----
    function errText(r, fallback) {
      if (r.status === 401) return Promise.resolve('Sua sessão expirou — entre novamente.');
      if (r.status === 413) return Promise.resolve('Imagem muito grande — o máximo é 8 MB.');
      return r.text().then(function (t) {
        t = (t || '').trim();
        // The server's own errors are short Portuguese sentences; anything else
        // (HTML error pages, Go runtime prefixes) gets the generic fallback.
        if (!t || t.length > 160 || t.charAt(0) === '<' || /^[a-z\/.]+: /.test(t)) return fallback;
        return t;
      }).catch(function () { return fallback; });
    }
    function showErr(node, base, r, fallback) {
      return errText(r, fallback).then(function (t) {
        node.textContent = t; node.className = base + ' err';
        if (r.status === 401) {
          node.appendChild(document.createTextNode(' '));
          var a = document.createElement('a'); a.href = '/login?next=/community'; a.textContent = 'Entrar';
          node.appendChild(a);
        }
      });
    }

    // ----- Rendering -----
    function avatarBox(author, size) {
      var box = document.createElement('span');
      box.className = 'ava';
      box.style.width = size + 'px'; box.style.height = size + 'px';
      box.style.font = '600 ' + Math.round(size * 0.5) + 'px/' + size + 'px serif';
      var u = author.username || '', initial = (u || '?').charAt(0).toUpperCase();
      if (author.has_avatar && u) {
        var img = document.createElement('img');
        img.src = '/avatar/u/' + encodeURIComponent(u) + '?v=' + (author.avatar_ver || 0);
        img.alt = '@' + u;
        img.onerror = function () { box.textContent = initial; };
        box.appendChild(img);
      } else { box.textContent = initial; }
      return box;
    }

    // Wraps the avatar in a profile link only when there IS a profile to link
    // to — a dead "#" link that scrolls to the top helps no one.
    function avatarLink(author, size) {
      var u = (author && author.username) || '';
      var wrap = document.createElement(u ? 'a' : 'span');
      if (u) wrap.href = '/@' + encodeURIComponent(u);
      wrap.appendChild(avatarBox(author || {}, size));
      return wrap;
    }

    function timeAgo(iso) {
      var t = Date.parse(iso);
      if (isNaN(t)) return '';
      var s = Math.max(0, Math.floor((Date.now() - t) / 1000));
      if (s < 60) return 'agora';
      var m = Math.floor(s / 60); if (m < 60) return 'há ' + m + ' min';
      var h = Math.floor(m / 60); if (h < 24) return 'há ' + h + ' h';
      var d = Math.floor(h / 24); if (d < 7) return 'há ' + d + ' d';
      return new Date(t).toLocaleDateString('pt-BR');
    }
    function fullDate(iso) {
      var t = Date.parse(iso);
      return isNaN(t) ? '' : new Date(t).toLocaleString('pt-BR');
    }
    // Relative times go stale the moment they render; keep them honest.
    setInterval(function () {
      document.querySelectorAll('time[datetime]').forEach(function (t) {
        t.textContent = timeAgo(t.getAttribute('datetime'));
      });
    }, 60000);

    function mine(a) { return !!(me.username && a && me.username === a.username); }
    function canDelete(a) { return !!(me.logged_in && (me.owner || mine(a))); }

    // Author + timestamp. The timestamp is a <time> with the exact moment in its
    // tooltip and, for posts, doubles as the permalink (?post=ID).
    function metaRow(author, iso, permalink) {
      var meta = document.createElement('span'); meta.className = 'meta';
      var u = (author && author.username) || '';
      var name = document.createElement(u ? 'a' : 'span');
      name.className = u ? 'name' : 'anon';
      if (u) name.href = '/@' + encodeURIComponent(u);
      name.textContent = u ? '@' + u : 'anônimo';
      meta.appendChild(name);
      // Paying members get a small "NAVY" tag — the "critique guaranteed"
      // signal, and what the owner's review queue is built around. Only the
      // feed carries author.member, so comment authors get no badge.
      if (author && author.member) {
        var badge = document.createElement('span'); badge.className = 'memberbadge';
        badge.textContent = 'NAVY'; badge.title = 'Membro Navy — prioridade nos conselhos e feedback';
        badge.setAttribute('aria-label', 'Membro Navy');
        meta.appendChild(badge);
      }
      var time = document.createElement('span'); time.className = 'time';
      time.appendChild(document.createTextNode(' · '));
      var t = document.createElement('time');
      t.dateTime = iso; t.textContent = timeAgo(iso);
      var full = fullDate(iso); if (full) t.title = full;
      if (permalink) {
        var a = document.createElement('a'); a.className = 'plink'; a.href = permalink;
        a.title = 'Link desta publicação'; a.appendChild(t);
        time.appendChild(a);
      } else { time.appendChild(t); }
      meta.appendChild(time);
      return meta;
    }

    // Replaces the old confirm() popup: the button swaps for an inline
    // "question sim · não" right where the click happened, so nothing blocks
    // the page and the warning (comments go too) is impossible to miss.
    function inlineConfirm(question, onYes) {
      var wrap = document.createElement('span'); wrap.className = 'del-wrap';
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'del'; b.textContent = 'apagar';
      wrap.appendChild(b); // show the button on first paint (reset() re-adds it after errors)
      function reset(errMsg) {
        wrap.textContent = ''; wrap.appendChild(b);
        if (errMsg) {
          var e = document.createElement('span'); e.className = 'msg err'; e.textContent = ' ' + errMsg;
          wrap.appendChild(e);
        }
      }
      b.addEventListener('click', function () {
        wrap.textContent = '';
        var q = document.createElement('span'); q.className = 'confirm';
        q.appendChild(document.createTextNode(question + ' '));
        var yes = document.createElement('button'); yes.type = 'button'; yes.className = 'linkbtn yes'; yes.textContent = 'sim';
        var no = document.createElement('button'); no.type = 'button'; no.className = 'linkbtn'; no.textContent = 'não';
        yes.addEventListener('click', function () { yes.disabled = true; no.disabled = true; onYes(reset); });
        no.addEventListener('click', function () { reset(); });
        q.appendChild(yes); q.appendChild(document.createTextNode(' · ')); q.appendChild(no);
        wrap.appendChild(q);
        no.focus();
      });
      return wrap;
    }

    // Character counter for a textarea ("123/2000"). Quiet until the cap is
    // actually near (no "0/2000" noise), then visible — and announced, so the
    // hard maxlength stop doesn't arrive as a surprise for anyone.
    function bindCounter(ta, span, max) {
      span.setAttribute('role', 'status');
      function update() {
        var n = ta.value.length;
        span.textContent = n + '/' + max;
        span.className = 'count' + (n >= Math.floor(max * 0.95) ? ' warn' : '');
        span.hidden = n < Math.floor(max * 0.8);
        // Phones have no resize handle: grow the box with the text instead
        // (and shrink back to one line when it empties, e.g. after publishing).
        if (!n) ta.style.height = '';
        else if (ta.scrollHeight > ta.clientHeight) ta.style.height = ta.scrollHeight + 2 + 'px';
      }
      ta.addEventListener('input', update);
      update();
      return span;
    }
    function mkCounter(ta, max) { return bindCounter(ta, document.createElement('span'), max); }

    // ❤️ Likes — optimistic: the heart flips at once and rolls back if the
    // server disagrees. target is {post_id: id} or {comment_id: id}; obj is the
    // rendered post/comment itself, so re-renders keep the state.
    function likeButton(target, obj) {
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'linkbtn like';
      function paint() {
        b.textContent = (obj.liked ? '❤️' : '🤍') + (obj.like_count ? ' ' + obj.like_count : '');
        b.setAttribute('aria-pressed', obj.liked ? 'true' : 'false');
        b.title = obj.liked ? 'Descurtir' : 'Curtir';
        b.setAttribute('aria-label', (obj.liked ? 'Descurtir' : 'Curtir') +
          (obj.like_count ? ' (' + obj.like_count + ' curtidas)' : ''));
      }
      paint();
      b.addEventListener('click', function () {
        if (!me.logged_in) {
          // Don't destroy the heart — show a transient hint beside it (once),
          // so the button is still there after they decide not to log in.
          if (!b.dataset.hint) {
            b.dataset.hint = '1';
            var s = document.createElement('span'); s.className = 'msg hint';
            s.appendChild(document.createTextNode(' Entre para curtir — '));
            var a = document.createElement('a'); a.href = '/login?next=/community'; a.textContent = 'Entrar';
            s.appendChild(a);
            b.parentNode.insertBefore(s, b.nextSibling);
            setTimeout(function () { if (s.parentNode) s.remove(); b.dataset.hint = ''; }, 6000);
          }
          return;
        }
        var want = !obj.liked;
        obj.liked = want;
        obj.like_count = Math.max(0, (obj.like_count || 0) + (want ? 1 : -1));
        paint();
        var fd = new FormData();
        for (var k in target) fd.append(k, target[k]);
        fd.append('on', want ? '1' : '0');
        function undo() {
          obj.liked = !want;
          obj.like_count = Math.max(0, obj.like_count + (want ? -1 : 1));
          paint();
        }
        fetch('/api/like', { method: 'POST', body: fd })
          .then(function (r) { if (r.status !== 204) undo(); })
          .catch(undo);
      });
      return b;
    }

    // Post body area: title (a real heading), markdown body, image.
    // detail = the single-post view (?post=ID). In the feed (detail falsy) the
    // whole card opens the post, so the title is a link and the image is a plain
    // thumbnail (a click anywhere opens the thread). On the post page the image
    // links to the full-size file instead — the inline render is ~340px on a
    // phone, useless for actually looking at a piece on an art board.
    function fillPostContent(box, p, detail) {
      box.textContent = '';
      var parts = splitTitle(p.body);
      if (parts.title) {
        var title = document.createElement('h2'); title.className = 'post-title';
        if (detail) {
          title.textContent = parts.title;
        } else {
          var tl = document.createElement('a'); tl.className = 'post-title-link';
          tl.href = '/post/' + p.id; tl.textContent = parts.title;
          title.appendChild(tl);
        }
        box.appendChild(title);
      }
      if (parts.rest) box.appendChild(markdown(parts.rest));
      if (p.has_image) {
        var img = document.createElement('img');
        img.className = 'post-img'; img.src = '/post-img/' + p.id; img.alt = 'Imagem da publicação'; img.loading = 'lazy';
        if (detail) {
          var ilink = document.createElement('a');
          ilink.href = '/post-img/' + p.id; ilink.target = '_blank'; ilink.rel = 'noopener';
          ilink.appendChild(img);
          box.appendChild(ilink);
        } else {
          box.appendChild(img);
        }
      }
    }

    // In-place editing for the author's own post (typos shouldn't cost the post
    // and its comments). The image, if any, stays.
    function editPost(art, p) {
      var content = art.querySelector('.content');
      if (content.querySelector('form')) return; // already editing
      content.textContent = '';
      var f = document.createElement('form'); f.className = 'editbox';
      var ta = document.createElement('textarea');
      ta.rows = 6; ta.maxLength = 2000; ta.value = p.body || ''; ta.setAttribute('aria-label', 'Editar publicação');
      var row = document.createElement('div'); row.className = 'row';
      var save = document.createElement('button'); save.type = 'submit'; save.textContent = 'Salvar';
      var cancel = document.createElement('button'); cancel.type = 'button'; cancel.textContent = 'Cancelar';
      var count = mkCounter(ta, 2000);
      var msg = document.createElement('span'); msg.className = 'msg';
      row.appendChild(save); row.appendChild(cancel); row.appendChild(count); row.appendChild(msg);
      f.appendChild(ta); f.appendChild(row);
      cancel.addEventListener('click', function () { fillPostContent(content, p, false); });
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var body = ta.value.trim();
        if (!body && !p.has_image) { msg.textContent = 'Escreva algo — esta publicação não tem imagem.'; msg.className = 'msg err'; return; }
        save.disabled = true; msg.textContent = 'Salvando…'; msg.className = 'msg';
        var fd = new FormData(); fd.append('id', p.id); fd.append('body', body);
        fetch('/api/posts/edit', { method: 'POST', body: fd })
          .then(function (r) {
            save.disabled = false;
            if (r.status === 204) { p.body = body; fillPostContent(content, p, false); return; }
            return showErr(msg, 'msg', r, 'Não foi possível salvar.');
          })
          .catch(function () { save.disabled = false; msg.textContent = 'Erro de conexão.'; msg.className = 'msg err'; });
      });
      content.appendChild(f);
      ta.focus();
    }

    function renderPost(p, detail) {
      var author = p.author || {};
      var art = document.createElement('article');
      art.className = 'post'; art.dataset.id = p.id; art.id = 'post-' + p.id;
      if (mine(author)) art.dataset.mine = '1';

      var head = document.createElement('div'); head.className = 'head';
      head.appendChild(avatarLink(author, 40));
      head.appendChild(metaRow(author, p.created_at, '/post/' + p.id));
      var actions = document.createElement('span'); actions.className = 'actions';
      if (mine(author)) {
        var ed = document.createElement('button');
        ed.type = 'button'; ed.className = 'linkbtn'; ed.textContent = 'editar';
        ed.addEventListener('click', function () { editPost(art, p); });
        actions.appendChild(ed);
      }
      if (canDelete(author)) {
        actions.appendChild(inlineConfirm('Apagar? Os comentários vão junto.', function (fail) {
          removePost(art, p.id, fail);
        }));
      }
      if (actions.children.length) head.appendChild(actions);
      art.appendChild(head);

      var content = document.createElement('div'); content.className = 'content';
      fillPostContent(content, p, detail);
      // In the feed, the post card opens its thread (like clicking a lesson) —
      // except on real interactive bits (links, image-less buttons), while text
      // is being selected, or while editing in place.
      if (!detail) {
        content.classList.add('clickable');
        content.addEventListener('click', function (e) {
          if (content.querySelector('.editbox')) return;
          if (e.target.closest('a, button, textarea, input')) return;
          if (window.getSelection && String(window.getSelection())) return;
          location.href = '/post/' + p.id;
        });
      }
      art.appendChild(content);

      var foot = document.createElement('div'); foot.className = 'foot';
      var cbtn = document.createElement('button');
      cbtn.type = 'button'; cbtn.className = 'cbtn linkbtn';
      cbtn.setAttribute('aria-expanded', 'false');
      cbtn.setAttribute('aria-controls', 'comments-' + p.id);
      art.dataset.ccount = p.comment_count || 0;
      cbtn.textContent = '💬 ' + art.dataset.ccount;
      cbtn.title = 'Comentários';
      cbtn.setAttribute('aria-label', 'Comentários (' + art.dataset.ccount + ')');
      cbtn.addEventListener('click', function () { toggleComments(art, p.id); });
      foot.appendChild(cbtn);
      foot.appendChild(likeButton({ post_id: p.id }, p));
      // Links travel by WhatsApp here: native share sheet where it exists
      // (i.e. on the phones), clipboard elsewhere. Tooltips can't do this.
      var share = document.createElement('button');
      share.type = 'button'; share.className = 'linkbtn share'; share.textContent = '🔗';
      share.title = 'Compartilhar'; share.setAttribute('aria-label', 'Compartilhar');
      share.addEventListener('click', function () {
        var u = location.origin + '/post/' + p.id;
        if (navigator.share) { navigator.share({ url: u }).catch(function () {}); return; }
        if (!navigator.clipboard) return;
        navigator.clipboard.writeText(u).then(function () {
          share.textContent = '✅'; share.title = 'Link copiado!';
          setTimeout(function () { share.textContent = '🔗'; share.title = 'Compartilhar'; }, 2000);
        }, function () {});
      });
      foot.appendChild(share);
      // Replies that arrived since the author last opened this thread.
      if (art.dataset.mine) {
        var n = p.comment_count || 0;
        if (seen[p.id] === undefined) { seen[p.id] = n; }
        else if (n > seen[p.id]) {
          var nr = document.createElement('span'); nr.className = 'newreplies';
          var diff = n - seen[p.id];
          nr.textContent = diff === 1 ? '1 nova resposta' : diff + ' novas respostas';
          foot.appendChild(nr);
        }
      }
      art.appendChild(foot);

      var comments = document.createElement('div');
      comments.className = 'comments'; comments.id = 'comments-' + p.id; comments.hidden = true;
      art.appendChild(comments);
      return art;
    }

    // In-place editing for the author's own comment.
    function editComment(div, c, art, postId) {
      var old = div.querySelector('.md');
      if (!old || div.querySelector('form')) return;
      var f = document.createElement('form'); f.className = 'editbox';
      var ta = document.createElement('textarea');
      ta.rows = 3; ta.maxLength = 1000; ta.value = c.body || ''; ta.setAttribute('aria-label', 'Editar comentário');
      var row = document.createElement('div'); row.className = 'row';
      var save = document.createElement('button'); save.type = 'submit'; save.textContent = 'Salvar';
      var cancel = document.createElement('button'); cancel.type = 'button'; cancel.textContent = 'Cancelar';
      var count = mkCounter(ta, 1000);
      var msg = document.createElement('span'); msg.className = 'msg';
      row.appendChild(save); row.appendChild(cancel); row.appendChild(count); row.appendChild(msg);
      f.appendChild(ta); f.appendChild(row);
      cancel.addEventListener('click', function () { f.replaceWith(markdown(c.body)); });
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var body = ta.value.trim();
        if (!body) { msg.textContent = 'Escreva um comentário.'; msg.className = 'msg err'; return; }
        save.disabled = true; msg.textContent = 'Salvando…'; msg.className = 'msg';
        var fd = new FormData(); fd.append('id', c.id); fd.append('body', body);
        fetch('/api/comments/edit', { method: 'POST', body: fd })
          .then(function (r) {
            save.disabled = false;
            if (r.status === 204) { loadComments(art, postId, { notice: 'Comentário salvo.' }); return; }
            return showErr(msg, 'msg', r, 'Não foi possível salvar.');
          })
          .catch(function () { save.disabled = false; msg.textContent = 'Erro de conexão.'; msg.className = 'msg err'; });
      });
      old.replaceWith(f);
      ta.focus();
    }

    function renderComment(c, art, postId) {
      var author = c.author || {};
      var div = document.createElement('div');
      div.className = c.parent_comment_id ? 'comment is-reply' : 'comment';
      div.appendChild(avatarLink(author, 28));
      var main = document.createElement('div'); main.className = 'cmain';
      // "↩ @username" indicator for replies
      if (c.reply_to_username) {
        var rto = document.createElement('div'); rto.className = 'reply-to';
        rto.appendChild(document.createTextNode('↩ '));
        var rtoA = document.createElement('a'); rtoA.href = '/@' + encodeURIComponent(c.reply_to_username);
        rtoA.textContent = '@' + c.reply_to_username;
        rto.appendChild(rtoA);
        main.appendChild(rto);
      }
      var meta = metaRow(author, c.created_at, null);
      meta.appendChild(likeButton({ comment_id: c.id }, c));
      if (canPost) {
        var rb = document.createElement('button');
        rb.type = 'button'; rb.className = 'linkbtn'; rb.textContent = 'responder';
        (function (commentId, authorUsername) {
          rb.addEventListener('click', function () {
            // Toggle: close if already open for this comment
            var existing = main.querySelector('.inline-reply-form');
            if (existing) { existing.remove(); return; }
            // Close any other open reply forms in this post
            var others = art.querySelectorAll('.inline-reply-form');
            others.forEach(function (f) { f.remove(); });
            var f = makeInlineReplyForm(art, postId, commentId, authorUsername);
            main.appendChild(f);
            f.querySelector('textarea').focus();
          });
        })(c.id, author.username || '');
        meta.appendChild(rb);
      }
      if (mine(author)) {
        var ed = document.createElement('button');
        ed.type = 'button'; ed.className = 'linkbtn'; ed.textContent = 'editar';
        ed.addEventListener('click', function () { editComment(div, c, art, postId); });
        meta.appendChild(ed);
      }
      if (canDelete(author)) {
        meta.appendChild(inlineConfirm('Apagar comentário?', function (fail) {
          removeComment(art, postId, c.id, fail);
        }));
      }
      main.appendChild(meta);
      main.appendChild(markdown(c.body));
      div.appendChild(main);
      return div;
    }

    function replyForm(art, postId) {
      var f = document.createElement('form'); f.className = 'reply';
      var ta = document.createElement('textarea');
      ta.rows = 1; ta.maxLength = 1000;
      ta.placeholder = 'Escreva um comentário…';
      ta.setAttribute('aria-label', 'Seu comentário');
      var row = document.createElement('div'); row.className = 'row';
      var btn = document.createElement('button'); btn.type = 'submit'; btn.textContent = 'Comentar';
      var count = mkCounter(ta, 1000);
      var msg = document.createElement('span'); msg.className = 'msg';
      row.appendChild(btn); row.appendChild(count); row.appendChild(msg);
      f.appendChild(ta); f.appendChild(row);
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var body = ta.value.trim();
        if (!body) return;
        btn.disabled = true; msg.textContent = 'Enviando…'; msg.className = 'msg';
        var fd = new FormData(); fd.append('post_id', postId); fd.append('body', body);
        fetch('/api/comments', { method: 'POST', body: fd })
          .then(function (r) {
            btn.disabled = false;
            if (r.status === 204) { loadComments(art, postId, { scrollLast: true, notice: 'Comentário publicado.' }); return; }
            return showErr(msg, 'msg', r, 'Não foi possível comentar.');
          })
          .catch(function () { btn.disabled = false; msg.textContent = 'Erro de conexão.'; msg.className = 'msg err'; });
      });
      return f;
    }

    // Inline reply form that appears under a specific comment. Submits with
    // parent_comment_id so the server threads it.
    function makeInlineReplyForm(art, postId, parentCommentId, parentUsername) {
      var f = document.createElement('form'); f.className = 'reply inline-reply-form';
      var ta = document.createElement('textarea');
      ta.rows = 1; ta.maxLength = 1000;
      ta.placeholder = parentUsername ? 'Responda a @' + parentUsername + '…' : 'Escreva uma resposta…';
      ta.setAttribute('aria-label', 'Sua resposta');
      var row = document.createElement('div'); row.className = 'row';
      var btn = document.createElement('button'); btn.type = 'submit'; btn.textContent = 'Responder';
      var cancel = document.createElement('button'); cancel.type = 'button'; cancel.textContent = 'Cancelar';
      var count = mkCounter(ta, 1000);
      var msg = document.createElement('span'); msg.className = 'msg';
      cancel.addEventListener('click', function () { f.remove(); });
      row.appendChild(btn); row.appendChild(cancel); row.appendChild(count); row.appendChild(msg);
      f.appendChild(ta); f.appendChild(row);
      f.addEventListener('submit', function (e) {
        e.preventDefault();
        var body = ta.value.trim();
        if (!body) return;
        btn.disabled = true; msg.textContent = 'Enviando…'; msg.className = 'msg';
        var fd = new FormData();
        fd.append('post_id', postId);
        fd.append('parent_comment_id', parentCommentId);
        fd.append('body', body);
        fetch('/api/comments', { method: 'POST', body: fd })
          .then(function (r) {
            btn.disabled = false;
            if (r.status === 204) { loadComments(art, postId, { scrollLast: true, notice: 'Resposta publicada.' }); return; }
            return showErr(msg, 'msg', r, 'Não foi possível responder.');
          })
          .catch(function () { btn.disabled = false; msg.textContent = 'Erro de conexão.'; msg.className = 'msg err'; });
      });
      return f;
    }

    // The comments toggle announces its state (label + aria-expanded) instead of
    // being a count that mysteriously expands things.
    function setCbtn(art, open) {
      var cbtn = art.querySelector('.cbtn');
      if (!cbtn) return;
      cbtn.setAttribute('aria-expanded', open ? 'true' : 'false');
      cbtn.textContent = '💬 ' + (art.dataset.ccount || 0);
      cbtn.title = open ? 'Ocultar comentários' : 'Comentários';
      cbtn.setAttribute('aria-label', (open ? 'Ocultar comentários (' : 'Comentários (') + (art.dataset.ccount || 0) + ')');
    }

    // Render a thread: comments in tree order (root comment → its replies indented),
    // then the reply form — or, for whoever can't post, the membership gate.
    // opts.scrollLast brings the newest comment into view; opts.notice confirms in form.
    function fillComments(art, postId, list, opts) {
      opts = opts || {};
      var box = art.querySelector('.comments');
      box.textContent = ''; box.dataset.loaded = '1';
      var frag = document.createDocumentFragment();
      if (!list.length) {
        var none = document.createElement('p'); none.className = 'hint';
        none.textContent = 'Ainda não há comentários.';
        frag.appendChild(none);
      } else {
        // Build parent→children map; root comments have no parent_comment_id.
        var childrenOf = {};
        var roots = [];
        list.forEach(function (c) {
          var pid = c.parent_comment_id;
          if (pid) {
            if (!childrenOf[pid]) childrenOf[pid] = [];
            childrenOf[pid].push(c);
          } else {
            roots.push(c);
          }
        });
        function appendTree(c) {
          frag.appendChild(renderComment(c, art, postId));
          (childrenOf[c.id] || []).forEach(appendTree);
        }
        roots.forEach(appendTree);
      }
      var form = null;
      if (canPost) { form = replyForm(art, postId); frag.appendChild(form); }
      else { var g = document.createElement('div'); g.className = 'hint'; gateLine(g); frag.appendChild(g); }
      box.appendChild(frag);
      art.dataset.ccount = list.length;
      setCbtn(art, !box.hidden);
      if (art.dataset.mine) {
        seen[postId] = list.length; writeSeen();
        var nr = art.querySelector('.newreplies'); if (nr) nr.remove();
      }
      if (opts.scrollLast && list.length) {
        var cs = box.querySelectorAll('.comment');
        cs[cs.length - 1].scrollIntoView({ block: 'nearest' });
      }
      if (opts.notice && form) {
        var m = form.querySelector('.msg'); m.textContent = opts.notice; m.className = 'msg ok';
      }
    }

    // Fetch + (re)render a post's comments, refreshing the count label.
    function loadComments(art, postId, opts) {
      var box = art.querySelector('.comments');
      box.textContent = 'Carregando…';
      // Comments only — the post is already on screen, so don't refetch it.
      return fetch('/api/comments?post_id=' + postId, { headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (d) { fillComments(art, postId, d.comments || [], opts); })
        .catch(function () { box.textContent = 'Não foi possível carregar os comentários.'; });
    }

    function toggleComments(art, postId) {
      var box = art.querySelector('.comments');
      if (box.hidden) {
        box.hidden = false;
        setCbtn(art, true);
        if (!box.dataset.loaded) loadComments(art, postId);
      } else {
        box.hidden = true;
        setCbtn(art, false);
      }
    }

    function updateEmpty() {
      empty.hidden = !!(feed.children.length || pinned.querySelector('.post'));
    }

    function removePost(art, id, fail) {
      var fd = new FormData(); fd.append('id', id);
      fetch('/api/posts/delete', { method: 'POST', body: fd })
        .then(function (r) {
          if (r.status === 204) {
            art.remove();
            allPosts = allPosts.filter(function (p) { return p.id !== id; });
            if (!pinned.querySelector('.post')) pinned.textContent = ''; // drop an orphaned link-label
            updateEmpty();
            refreshDailyGate(); // deleting today's post frees the daily slot
            return;
          }
          errText(r, 'Não foi possível apagar.').then(fail);
        })
        .catch(function () { fail('Erro de conexão.'); });
    }

    function removeComment(art, postId, id, fail) {
      var fd = new FormData(); fd.append('id', id);
      fetch('/api/comments/delete', { method: 'POST', body: fd })
        .then(function (r) {
          if (r.status === 204) { loadComments(art, postId, { notice: 'Comentário apagado.' }); return; }
          errText(r, 'Não foi possível apagar.').then(fail);
        })
        .catch(function () { fail('Erro de conexão.'); });
    }

    // A "← Comunidade" link back to the feed, at the top of a post page.
    function backLink() {
      var p = document.createElement('p'); p.className = 'backlink';
      var a = document.createElement('a'); a.href = '/community'; a.textContent = '← Comunidade';
      p.appendChild(a); return p;
    }

    // The single-post page (/post/<id>): the post, then ALL its comments open,
    // then the reply form (or the gate). A dead link says so instead of failing
    // silently. detailMode hides the feed, so this is the whole page.
    function showPostPage(id) {
      return fetch('/api/post?id=' + id, { headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function (d) {
          if (!d.post) return;
          pinned.appendChild(backLink());
          var art = renderPost(d.post, true);
          pinned.appendChild(art);
          art.querySelector('.comments').hidden = false;
          fillComments(art, d.post.id, d.comments || []);
          var parts = splitTitle(d.post.body);
          document.title = (parts.title || 'Publicação') + ' — Comunidade Navy Lily';
        })
        .catch(function (status) {
          pinned.appendChild(backLink());
          var pmsg = document.createElement('p'); pmsg.className = 'hint';
          pmsg.textContent = status === 404
            ? 'A publicação não existe mais — pode ter sido apagada.'
            : 'Não foi possível carregar a publicação.';
          pinned.appendChild(pmsg);
        });
    }

    // Split fetch from render so the first feed request can fly in parallel with
    // /me (rendering doesn't wait forever for identity — see boot below).
    function fetchFeedData(reset) {
      var url = '/api/posts?board=' + BOARD;
      if (membersOnly) url += '&members=1';            // owner queue: one unpaginated page
      else if (!reset && lastId) url += '&before=' + lastId;
      return fetch(url, { headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); });
    }

    function showFeedLoading() {
      feed.textContent = '';
      var p = document.createElement('p'); p.className = 'hint'; p.textContent = 'Carregando…';
      feed.appendChild(p);
      feed.setAttribute('aria-busy', 'true');
    }

    function renderFeed(d, reset) {
      var posts = d.posts || [];
      if (reset) { feed.textContent = ''; lastId = 0; allPosts = []; }
      feed.setAttribute('aria-busy', 'false');
      var frag = document.createDocumentFragment();
      posts.forEach(function (p) {
        lastId = p.id;
        allPosts.push(p);
        if (p.id === pinnedId) return; // already shown on top
        frag.appendChild(renderPost(p));
      });
      feed.appendChild(frag);
      writeSeen();
      updateEmpty();
      // has_more comes from the server (exact); the length heuristic only
      // covers a server that predates it.
      var more = d.has_more !== undefined ? !!d.has_more : posts.length >= PAGE;
      moreBtn.hidden = !more;
      moreBtn.disabled = false;
      moreBtn.textContent = 'Carregar mais';
      if (!reset && !more) el('end').hidden = false;
    }

    // Errors keep their own element (and a retry) — they never squat in #empty,
    // where stale text could resurface later as a bogus empty-state message.
    function feedError(reset) {
      if (reset) {
        feed.textContent = '';
        feed.setAttribute('aria-busy', 'false');
        el('feed-error').hidden = false;
      } else {
        moreBtn.disabled = false;
        moreBtn.textContent = 'Não carregou — tentar novamente';
      }
    }

    function loadFeed(reset) {
      if (reset) { el('feed-error').hidden = true; el('end').hidden = true; showFeedLoading(); }
      moreBtn.disabled = true;
      if (!moreBtn.hidden) moreBtn.textContent = 'Carregando…';
      return fetchFeedData(reset).then(function (d) { renderFeed(d, reset); }).catch(function () { feedError(reset); });
    }

    // Identity arrived after a fast first paint: swap each post for one with
    // the member's controls — but leave posts the reader has opened or is
    // typing in alone, so thread state and half-written replies survive (and
    // nothing jumps under their thumb).
    function rerenderFeed() {
      allPosts.forEach(function (p) {
        if (p.id === pinnedId) return;
        var art = document.getElementById('post-' + p.id);
        if (art && art.querySelector('.comments').hidden && !art.querySelector('form')) art.replaceWith(renderPost(p));
      });
      writeSeen();
    }

    // Same idea on the post page: /me landed after the post rendered read-only,
    // so re-fetch to bring in the reply form — unless a reply is being typed.
    function rerenderPostPage() {
      var art = pinned.querySelector('.post');
      if (!art) return;
      var ta = art.querySelector('.reply textarea');
      if (ta && ta.value.trim()) return;
      pinned.textContent = '';
      showPostPage(pinnedId);
    }

    moreBtn.addEventListener('click', function () { loadFeed(false); });
    el('retry').addEventListener('click', function () { loadFeed(true); });

    // Owner's review queue: flip to member posts only (oldest first), and back.
    el('queue-toggle').addEventListener('click', function () {
      membersOnly = !membersOnly;
      this.textContent = membersOnly ? 'Ver tudo' : 'Fila de membros';
      this.setAttribute('aria-pressed', membersOnly ? 'true' : 'false');
      loadFeed(true);
    });

    // ----- Board tabs -----
    var boardTabs = document.querySelectorAll('.board-tab');
    function syncBoardTabs() {
      Array.prototype.forEach.call(boardTabs, function (t) {
        if (t.getAttribute('data-board') === BOARD) t.setAttribute('aria-current', 'page');
        else t.removeAttribute('aria-current');
      });
    }
    Array.prototype.forEach.call(boardTabs, function (t) {
      t.addEventListener('click', function () {
        var b = t.getAttribute('data-board');
        if (b === BOARD) return;
        BOARD = b;
        syncBoardTabs();
        // Reflect the board in the URL so a refresh or shared link keeps it;
        // a pinned (linked) post belongs to one board, so drop it on switch.
        var qs = new URLSearchParams(location.search);
        qs.set('board', BOARD); qs.delete('post');
        history.replaceState(null, '', location.pathname + '?' + qs.toString());
        pinned.textContent = ''; pinnedId = 0;
        loadFeed(true);
      });
    });
    syncBoardTabs();

    // ----- Compose box -----
    var composeBody = el('compose-body');
    bindCounter(composeBody, el('compose-count'), 2000);

    // Draft survives a refresh or stray navigation.
    composeBody.addEventListener('input', function () {
      saveDraft(composeBody.value);
    });
    function restoreDraft() {
      if (!composeBody.value && readDraft()) {
        composeBody.value = readDraft();
        composeBody.dispatchEvent(new Event('input')); // refresh counter
      }
    }

    // Image attach: previewed, removable, and shrunk client-side. Phone photos
    // routinely exceed the server's 8 MB cap, and "resize it yourself" is a
    // dead end on a phone — so anything heavy is re-encoded (≤2000px JPEG)
    // before upload, which also turns minute-long cellular uploads into
    // seconds. GIFs pass through: re-encoding would freeze them.
    var MAX_IMG = 8 * 1024 * 1024, imageFile = null, imgPending = false;
    function shrink(f) {
      if (f.size <= 1.5 * 1024 * 1024 || f.type === 'image/gif') return Promise.resolve(f);
      return new Promise(function (done) {
        var url = URL.createObjectURL(f), img = new Image();
        img.onload = function () {
          var k = Math.min(1, 2000 / Math.max(img.width, img.height));
          var cv = document.createElement('canvas');
          cv.width = Math.round(img.width * k); cv.height = Math.round(img.height * k);
          cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
          cv.toBlob(function (b) { URL.revokeObjectURL(url); done(b && b.size < f.size ? b : f); }, 'image/jpeg', 0.85);
        };
        // Not decodable here? Send the original and let the server judge it.
        img.onerror = function () { URL.revokeObjectURL(url); done(f); };
        img.src = url;
      });
    }
    function clearImage() {
      el('compose-image').value = '';
      el('compose-img-preview').textContent = '';
      imageFile = null;
    }
    // useImage runs any incoming file — picker, drag-and-drop or paste —
    // through the same shrink-and-preview pipeline. The thumbnail carries its
    // own ✕, so removing is one tap on the thing being removed.
    function useImage(f) {
      var prev = el('compose-img-preview'); prev.textContent = '';
      imageFile = null;
      if (!f) return;
      imgPending = true;
      shrink(f).then(function (g) {
        imgPending = false;
        if (g.size > MAX_IMG) {
          clearImage();
          var msg = el('compose-msg');
          msg.textContent = 'Imagem muito grande — o máximo é 8 MB.'; msg.className = 'hint err';
          return;
        }
        imageFile = g;
        var url = URL.createObjectURL(g);
        var img = document.createElement('img'); img.src = url; img.alt = 'Pré-visualização da imagem';
        img.onload = function () { URL.revokeObjectURL(url); };
        var x = document.createElement('button');
        x.type = 'button'; x.className = 'imgx'; x.textContent = '✕';
        x.title = 'Remover imagem'; x.setAttribute('aria-label', 'Remover imagem');
        x.addEventListener('click', clearImage);
        prev.appendChild(img); prev.appendChild(x);
      });
    }
    el('compose-attach').addEventListener('click', function () { el('compose-image').click(); });
    el('compose-attach-text').addEventListener('click', function () { el('compose-image').click(); });
    el('compose-image').addEventListener('change', function () { useImage(this.files[0]); });
    // Drag a picture onto the compose box — or paste one — and it attaches.
    var composeBox = el('compose');
    composeBox.addEventListener('dragover', function (e) { e.preventDefault(); });
    composeBox.addEventListener('drop', function (e) {
      e.preventDefault();
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f && /^image\//.test(f.type)) useImage(f);
    });
    composeBody.addEventListener('paste', function (e) {
      var fs = e.clipboardData && e.clipboardData.files;
      if (fs && fs[0] && /^image\//.test(fs[0].type)) { e.preventDefault(); useImage(fs[0]); }
    });

    el('compose-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var body = composeBody.value.trim();
      var file = imageFile;
      var msg = el('compose-msg'), btn = el('compose-btn');
      // A picked/dropped file that shrink() hasn't finished with must not be lost.
      if (imgPending && !file) { msg.textContent = 'Um instante — preparando a imagem…'; msg.className = 'hint'; return; }
      if (!body && !file) { msg.textContent = 'Escreva algo ou anexe uma imagem.'; msg.className = 'hint err'; return; }
      btn.disabled = true; msg.textContent = 'Publicando…'; msg.className = 'hint';
      var fd = new FormData(); fd.append('body', body); fd.append('board', BOARD); if (file) fd.append('image', file, file.name || 'foto.jpg');
      fetch('/api/posts', { method: 'POST', body: fd })
        .then(function (r) {
          btn.disabled = false;
          if (r.status === 204) {
            composeBody.value = ''; saveDraft('');
            composeBody.dispatchEvent(new Event('input'));
            clearImage();
            msg.textContent = ''; msg.className = 'hint';
            setDailyGate(true, true); // success + the daily note, in the gate
            return loadFeed(true);
          }
          return showErr(msg, 'hint', r, 'Não foi possível publicar. Tente novamente.');
        })
        .catch(function () { btn.disabled = false; msg.textContent = 'Erro de conexão. Tente novamente.'; msg.className = 'hint err'; });
    });

    // ----- Gate / daily limit -----
    // The "why you can't participate" line, used at the top of the page and
    // inside open threads. Posting is free, so the gate is small: log out →
    // make an account; logged in without a handle → pick a username.
    function gateLine(node) {
      // Logged out: a short list of the ways in (post free / pay for priority /
      // sign in), each item a link. Posting is free; the paid pitch is priority.
      if (!me.logged_in) {
        var ul = document.createElement('ul'); ul.className = 'gate-list';
        [
          ['/signup?next=/community', 'Crie uma conta gratuita para publicar desenhos'],
          ['/comprar', 'Se torne um membro pago para prioridade em feedback'],
          ['/login?next=/community', 'Entre, se já tem uma conta']
        ].forEach(function (l) {
          var li = document.createElement('li');
          var a = document.createElement('a'); a.href = l[0]; a.textContent = l[1];
          li.appendChild(a); ul.appendChild(li);
        });
        node.appendChild(ul);
        return;
      }
      // Logged in but no username yet: one step left.
      node.appendChild(document.createTextNode('Escolha um nome de usuário para participar. '));
      var a = document.createElement('a'); a.href = '/profile'; a.textContent = 'Editar perfil';
      node.appendChild(a);
    }

    function setupComposeArea() {
      var gate = el('gate'), compose = el('compose');
      if (canPost) {
        // Your own face next to the box — it reads as "you, about to speak".
        var ava = el('compose-ava');
        ava.textContent = '';
        ava.appendChild(avatarBox({ username: me.username, has_avatar: me.has_avatar, avatar_ver: me.avatar_ver }, 40));
        // Resolve the daily limit BEFORE showing the box — the old flow showed
        // it immediately and could swap it away mid-typing, eating the draft.
        todayCheck().then(function (posted) { setDailyGate(posted, false); });
        return;
      }
      el('compose-area').style.minHeight = '';
      compose.hidden = true; gate.textContent = '';
      // Posting is free, so always explain how to start: make an account, or
      // (logged in) pick a username.
      gate.hidden = false; gateLine(gate);
    }

    // The compose box stays visible — there's no daily-limit message. A generous
    // per-day cap still exists server-side as a spam backstop, but it isn't
    // surfaced in the UI; the rare time it's hit, the submit shows the server's
    // reply. justPosted just flashes a brief confirmation.
    function setDailyGate(posted, justPosted) {
      if (!canPost) return;
      el('compose-area').style.minHeight = '';
      var gate = el('gate'), compose = el('compose');
      gate.hidden = true; gate.textContent = '';
      compose.hidden = false;
      restoreDraft();
      if (justPosted) {
        var msg = el('compose-msg');
        msg.textContent = 'Publicado!'; msg.className = 'hint ok';
      }
    }

    function fetchToday() {
      return fetch('/api/posts/today', { headers: { Accept: 'application/json' } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .catch(function () { return null; });
    }
    // The hint cookie says we're probably logged in: start the daily check now
    // so members don't wait on /me -> /today in series (visitors get no 401
    // noise), and reserve the compose box's slot so the feed doesn't lurch
    // down under the reader's thumb when the box pops in on a slow link.
    var hinted = /(?:^|;\s*)nl_hint=/.test(document.cookie);
    var todayReq = hinted ? fetchToday() : null;
    if (hinted) el('compose-area').style.minHeight = '7rem'; // the slim composer's height
    function todayCheck() {
      if (!todayReq) todayReq = fetchToday();
      return todayReq.then(function (d) { return !!(d && d.posted_today); });
    }
    function refreshDailyGate() {
      if (!canPost) return;
      todayReq = null; // re-check: a delete may have freed today's slot
      todayCheck().then(function (posted) { setDailyGate(posted, false); });
    }

    // ----- Boot: everything in parallel; render as soon as it's sensible -----
    function applyMe(d) {
      meApplied = true;
      me = d || {};
      // Posting is free: any account with a username can publish (a paid
      // membership buys guaranteed critique, not the right to post).
      canPost = !!(me.logged_in && me.username);
      empty.textContent = canPost ? 'Ainda não há publicações. Seja o primeiro!' : 'Ainda não há publicações.';
      if (me.owner && !detailMode) el('ownerbar').hidden = false; // members-first review queue
      // The post page has no top composer (the reply form lives in the thread).
      if (!detailMode) setupComposeArea();
    }
    function firstRender(fd) {
      splashDone();
      if (firstRendered) return;
      firstRendered = true;
      if (fd) renderFeed(fd, true); else feedError(true);
    }

    // The post page doesn't need the feed; only the feed flow fetches it.
    var feedData = detailMode ? null : fetchFeedData(true).catch(function () { return null; });
    var meReq = fetch('/me', { headers: { Accept: 'application/json' } })
      .then(function (r) { return r.ok ? r.json() : {}; })
      .catch(function () { return {}; });

    if (detailMode) {
      // Post page: render once identity is known (canPost decides reply form vs
      // gate), but don't wait forever on a slow/hung /me — render read-only at
      // 1.5s and patch the reply form in when /me finally lands.
      var postRendered = false;
      function renderPostPageOnce() {
        if (postRendered) return Promise.resolve();
        postRendered = true;
        splashDone();
        return showPostPage(pinnedId);
      }
      Promise.race([meReq, new Promise(function (res) { setTimeout(res, 1500); })])
        .then(function (d) { if (d && !meApplied) applyMe(d); return renderPostPageOnce(); });
      meReq.then(function (d) {
        var late = !meApplied;
        if (late) applyMe(d);
        if (postRendered && late && me.logged_in) rerenderPostPage();
      });
    } else {
      // Don't hold the (public) posts hostage to a slow /me: wait at most 1.5s
      // for identity, then render read-only; controls are patched in when /me lands.
      Promise.race([meReq, new Promise(function (res) { setTimeout(res, 1500); })])
        .then(function (d) { if (d && !meApplied) applyMe(d); return feedData; })
        .then(firstRender);
      meReq.then(function (d) {
        var late = !meApplied;
        if (late) applyMe(d);
        if (late && firstRendered && me.logged_in) rerenderFeed();
      });
    }
  })();
  </script>
</body>
</html>
