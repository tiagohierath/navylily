<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova senha — Navy Lily</title>
  <link rel="stylesheet" href="/site.css?v=1">
</head>
<body bgcolor="white">
  <main>
  <h1>Definir nova senha</h1>
  <p id="msg" role="alert" hidden></p>
  <form id="form">
    <p>
      <label for="password">Nova senha</label><br>
      <input id="password" type="password" required minlength="8" maxlength="72" placeholder="8 a 72 caracteres" autocomplete="new-password" autofocus>
    </p>
    <p>
      <label for="confirm">Confirmar senha</label><br>
      <input id="confirm" type="password" required minlength="8" maxlength="72" placeholder="repita a senha" autocomplete="new-password">
    </p>
    <button id="submit" type="submit">Salvar nova senha</button>
  </form>
  </main>
  <script src="/header.js?v=11" defer></script>
  <script>
    // The recovery link lands on /auth/callback, which forwards the URL fragment
    // (#access_token=...&type=recovery) here. Read the token from the fragment —
    // it never reaches the server on its own — and post it with the new password.
    (function () {
      const msg = document.getElementById('msg');
      const form = document.getElementById('form');
      const params = new URLSearchParams(location.hash.slice(1));
      const token = params.get('access_token');
      const err = params.get('error_description') || params.get('error');

      function fail(text) {
        msg.innerHTML = text + '<br><a href="/forgot">Pedir novo link</a>';
        msg.hidden = false;
        form.hidden = true;
      }
      if (err) { fail('Falha: ' + err); return; }
      if (!token) { fail('Link inválido ou expirado.'); return; }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        if (password.length < 8 || password !== confirm) {
          msg.textContent = 'As senhas devem ter ao menos 8 caracteres e ser iguais.';
          msg.hidden = false;
          return;
        }
        // Pending state while the request is in flight; restored on failure so
        // the form can be retried.
        const btn = document.getElementById('submit');
        btn.disabled = true;
        const label = btn.textContent;
        btn.textContent = 'Salvando…';
        const retry = function () { btn.disabled = false; btn.textContent = label; };
        try {
          const res = await fetch('/auth/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ access_token: token, password: password })
          });
          if (res.ok) { location.replace('/after-login'); return; }
          // Show the server's actual reason. A 401 means the link itself is
          // bad/expired (offer a fresh one); other errors — e.g. same/weak
          // password — are fixable right here, so keep the form up to retry.
          const reason = (await res.text()).trim() || 'Não foi possível alterar a senha.';
          if (res.status === 401) {
            fail(reason);
          } else {
            msg.textContent = reason;
            msg.hidden = false;
            retry();
          }
        } catch (e) {
          msg.textContent = 'Não foi possível alterar a senha. Tente novamente.';
          msg.hidden = false;
          retry();
        }
      });
    })();
  </script>
</body>
</html>
