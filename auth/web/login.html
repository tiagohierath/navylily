<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar — Navy Lily</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="stylesheet" href="/site.css?v=1">
</head>
<body bgcolor="white">
  <header class="site">
    <a class="btn" href="/login" aria-label="Perfil" title="Perfil">👤</a>
    <a class="brand" href="/"><img src="/logo.png?v=3" alt="Navy Lily" loading="lazy" style="height:28px;width:auto;display:block"></a>
    <a class="btn" href="/community" aria-label="Comunidade" title="Comunidade">💬<span class="lbl-rest"> Comunidade</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/wiki" aria-label="Wiki" title="Wiki">📖<span class="lbl-rest"> Wiki</span></a><span class="nav-sep"> · </span>
    <a class="btn" href="/comprar" aria-label="Navy" title="Navy">⛵</a>
  </header>
  <main>
  <form id="form" method="POST" action="/auth/login">
    <h1>Entrar na Navy Lily</h1>
    <!--ERRO-->
    <p>
      <label for="email">E-mail</label><br>
      <input id="email" name="email" type="email" required placeholder="voce@email.com" autocomplete="email" autofocus>
    </p>
    <p>
      <label for="password">Senha</label><br>
      <input id="password" name="password" type="password" required placeholder="sua senha" autocomplete="current-password">
      <button id="toggle" type="button" aria-pressed="false" hidden>Mostrar</button>
    </p>
    <p id="caps" role="status" style="color:#b00; font-size:.85em;" hidden>Caps Lock está ativado.</p>
    <input id="next" name="next" type="hidden">
    <button id="submit" type="submit">Entrar</button>
    <p><a id="forgot" href="/forgot">Esqueci minha senha</a></p>
    <p>Ainda não tem conta? <a id="signup" href="/signup">Criar conta</a>.</p>
  </form>
  </main>
  <script>
    // Preserve the page the user wanted (?next=/protected/...) through login,
    // so they land back on it. Only same-origin relative paths.
    (function () {
      const params = new URLSearchParams(location.search);
      const next = params.get('next') || '';
      if (next.startsWith('/') && !next.startsWith('//')) {
        document.getElementById('next').value = next;
        // Carry next over to the signup / forgot links too.
        const qs = '?next=' + encodeURIComponent(next);
        document.getElementById('signup').href = '/signup' + qs;
        document.getElementById('forgot').href = '/forgot' + qs;
      }
      // Welcome / gift links (and error redirects) arrive with ?email= so the
      // address doesn't have to be retyped — prefill and jump to the password.
      const email = params.get('email') || '';
      if (email.includes('@')) {
        document.getElementById('email').value = email;
        document.getElementById('password').focus();
        const forgot = document.getElementById('forgot');
        forgot.href += (forgot.href.includes('?') ? '&' : '?') + 'email=' + encodeURIComponent(email);
      }
      // The error block is rendered into the page server-side from ?erro=...;
      // if it's missing (server/HTML version skew), surface it client-side so
      // a failed login is never silent.
      if (params.get('erro') && !document.getElementById('erro')) {
        const p = document.createElement('p');
        p.id = 'erro';
        p.setAttribute('role', 'alert');
        p.style.color = '#b00';
        p.textContent = params.get('erro') === 'confirma'
          ? 'Sua conta ainda não foi confirmada. Abra o link que enviamos por e-mail (confira também o spam).'
          : 'E-mail ou senha incorretos.';
        const form = document.getElementById('form');
        form.insertBefore(p, form.children[1]);
      }
      // Drop the param so a refresh or bookmark shows a clean form again.
      if (params.get('erro')) {
        params.delete('erro');
        const qs = params.toString();
        history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
      }

      const pw = document.getElementById('password');
      // Show/hide password — catches the typo before the generic error does.
      // The button starts hidden so it only appears when JS is running.
      const toggle = document.getElementById('toggle');
      toggle.hidden = false;
      toggle.addEventListener('click', function () {
        const show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        toggle.textContent = show ? 'Ocultar' : 'Mostrar';
        toggle.setAttribute('aria-pressed', String(show));
        pw.focus();
      });
      // Warn about Caps Lock while typing the password.
      pw.addEventListener('keyup', function (e) {
        if (e.getModifierState) {
          document.getElementById('caps').hidden = !e.getModifierState('CapsLock');
        }
      });
      // One submission at a time: a pending label instead of a frozen-looking
      // page, and no duplicate POST from a second click.
      document.getElementById('form').addEventListener('submit', function () {
        const b = document.getElementById('submit');
        b.disabled = true;
        b.textContent = 'Entrando…';
      });
    })();
  </script>
  <script src="/header.js?v=11" defer></script>
</body>
</html>
